description:
  nl:
    features:
      - 5 skills voor internetstandaarden compliance
      - Webstandaarden (HTTPS, TLS, DNSSEC, IPv6, RPKI, security headers)
      - Mailstandaarden (DMARC, DKIM, SPF, STARTTLS, DANE)
      - Batch API voor bulk compliance scans
      - Stap-voor-stap implementatiegidsen
    genericName: Claude Code plugin
    longDescription: >
      Claude Code plugin voor het testen en implementeren van moderne
      internetstandaarden conform internet.nl. Bevat skills voor webstandaarden,
      mailstandaarden, de batch API en implementatiegidsen uit de toolbox-wiki.
      Alle standaarden staan op de 'pas-toe-of-leg-uit'-lijst van het Forum
      Standaardisatie.
    shortDescription: Claude Code plugin voor internet.nl standaarden
  en:
    features:
      - 5 skills for internet standards compliance
      - Web standards (HTTPS, TLS, DNSSEC, IPv6, RPKI, security headers)
      - Mail standards (DMARC, DKIM, SPF, STARTTLS, DANE)
      - Batch API for bulk compliance scans
      - Step-by-step implementation guides
    genericName: Claude Code plugin
    longDescription: >
      Claude Code plugin for testing and implementing modern internet standards
      as tested by internet.nl. Contains skills for web standards, mail
      standards, the batch API, and implementation guides from the toolbox wiki.
    shortDescription: Claude Code plugin for internet.nl standards
